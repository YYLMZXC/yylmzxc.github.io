# Jekyll 网站构建和部署到 GitHub Pages 的工作流
# 此工作流用于构建 Jekyll 网站并部署到 GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

# 触发条件（已禁用，使用 static.yml 工作流部署 BETA_TEST_HTML 目录）
# on:
#   # 当推送到 main 分支时触发
#   push:
#     branches: ["main"]
#
#   # 允许从 Actions 标签页手动运行此工作流
#   workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，允许部署到 GitHub Pages
permissions:
  contents: read        # 读取仓库内容的权限
  pages: write          # 写入 Pages 的权限
  id-token: write       # 写入 ID 令牌的权限

# 并发控制：只允许一个并发部署，跳过正在进行的运行和最新排队的运行之间的排队运行
# 但不要取消正在进行的运行，因为我们希望允许这些生产部署完成
concurrency:
  group: "pages"        # 并发组名称
  cancel-in-progress: false  # 不取消正在进行的运行

jobs:
  # 构建作业
  build:
    # 运行环境
    runs-on: ubuntu-latest
    
    # 执行步骤
    steps:
      # 1. 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v4
      
      # 2. 设置 Pages 配置
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      # 3. 使用 Jekyll 构建网站
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./         # 源代码目录
          destination: ./_site  # 构建输出目录
      
      # 4. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # 部署作业
  deploy:
    # 部署环境配置
    environment:
      name: github-pages  # 环境名称
      url: ${{ steps.deployment.outputs.page_url }}  # 部署后的页面 URL
    
    # 运行环境
    runs-on: ubuntu-latest
    
    # 依赖关系：必须在 build 作业完成后运行
    needs: build
    
    # 执行步骤
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment  # 步骤 ID，用于引用输出
        uses: actions/deploy-pages@v4
